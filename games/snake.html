<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SNAKE ATTACK</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-family:'Press Start 2P',monospace;
      color:#00ff41;
      user-select:none;
    }
    h1 {
      font-size:.75rem;
      color:#00ff41;
      text-shadow:0 0 10px #00ff41;
      margin-bottom:10px;
      letter-spacing:.2em;
    }
    .hud {
      display:flex;
      gap:24px;
      margin-bottom:8px;
      font-size:.42rem;
    }
    .canvas-wrap { position:relative; }
    canvas {
      display:block;
      border:2px solid #00ff41;
      box-shadow:0 0 16px #00ff41;
    }
    .overlay {
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.7);
      gap:12px;
    }
    .overlay h2 {
      font-size:.9rem;
      color:#00ff41;
      text-shadow:0 0 16px #00ff41;
    }
    .overlay .sub { font-size:.38rem; color:#aaa; }
    .overlay .blink { font-size:.33rem; animation:blink 1s infinite; }
    .controls {
      margin-top:8px;
      font-size:.28rem;
      color:#1a5520;
      text-align:center;
      line-height:2.2;
    }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>
</head>
<body>
  <h1>SNAKE ATTACK</h1>
  <div class="hud">
    <span>SCORE: <span id="score">0</span></span>
    <span>BEST: <span id="best">0</span></span>
  </div>
  <div class="canvas-wrap">
    <canvas id="c" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <h2>SNAKE ATTACK</h2>
      <p class="blink">PRESS SPACE TO START</p>
    </div>
  </div>
  <div class="controls">ARROW KEYS: MOVE &nbsp;|&nbsp; SPACE: START / PAUSE</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const CELL   = 20;
    const COLS   = canvas.width  / CELL;
    const ROWS   = canvas.height / CELL;

    let snake, dir, nextDir, food, score, best = 0, state = 'idle', timer;

    function init() {
      snake   = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir     = {x:1,y:0};
      nextDir = {x:1,y:0};
      score   = 0;
      document.getElementById('score').textContent = '0';
      placeFood();
    }

    function placeFood() {
      let f;
      do { f = {x:Math.random()*COLS|0, y:Math.random()*ROWS|0}; }
      while (snake.some(s => s.x===f.x && s.y===f.y));
      food = f;
    }

    function step() {
      dir = nextDir;
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      if (head.x<0 || head.x>=COLS || head.y<0 || head.y>=ROWS
          || snake.some(s => s.x===head.x && s.y===head.y)) {
        end(); return;
      }
      snake.unshift(head);
      if (head.x===food.x && head.y===food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        if (score > best) { best = score; document.getElementById('best').textContent = best; }
        placeFood();
      } else {
        snake.pop();
      }
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = 'rgba(0,255,65,0.04)';
      ctx.lineWidth   = .5;
      for (let i=0;i<=COLS;i++) {
        ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
      }
      for (let j=0;j<=ROWS;j++) {
        ctx.beginPath(); ctx.moveTo(0,j*CELL); ctx.lineTo(canvas.width,j*CELL); ctx.stroke();
      }

      // Food
      ctx.fillStyle  = '#ffee00';
      ctx.shadowColor = '#ffee00';
      ctx.shadowBlur = 12;
      ctx.fillRect(food.x*CELL+3, food.y*CELL+3, CELL-6, CELL-6);
      ctx.shadowBlur = 0;

      // Snake
      snake.forEach((seg, i) => {
        const bright = 255 - Math.min(i*4, 155);
        ctx.fillStyle = i===0 ? '#00ff41' : `rgb(0,${bright},${(bright*.25)|0})`;
        if (i===0) { ctx.shadowColor='#00ff41'; ctx.shadowBlur=10; }
        ctx.fillRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2);
        ctx.shadowBlur=0;
      });
    }

    function end() {
      clearInterval(timer);
      state = 'over';
      const ol = document.getElementById('overlay');
      ol.innerHTML = `
        <h2>GAME OVER</h2>
        <p class="sub">SCORE: ${score}</p>
        <p class="blink">PRESS SPACE TO RETRY</p>`;
      ol.style.display='flex';
    }

    function start() {
      init(); draw();
      document.getElementById('overlay').style.display='none';
      state = 'playing';
      const speed = () => Math.max(80, 160 - Math.floor(score/50)*10);
      // Use adaptive speed via recursive timeout
      (function tick() {
        step(); draw();
        if (state==='playing') timer = setTimeout(tick, Math.max(80, 160 - Math.floor(score/50)*10));
      })();
    }

    init(); draw();

    document.addEventListener('keydown', e => {
      switch(e.key) {
        case 'ArrowUp':    if(dir.y!==1)  nextDir={x:0,y:-1}; e.preventDefault(); break;
        case 'ArrowDown':  if(dir.y!==-1) nextDir={x:0,y:1};  e.preventDefault(); break;
        case 'ArrowLeft':  if(dir.x!==1)  nextDir={x:-1,y:0}; e.preventDefault(); break;
        case 'ArrowRight': if(dir.x!==-1) nextDir={x:1,y:0};  e.preventDefault(); break;
        case ' ':
          e.preventDefault();
          if (state !== 'playing') start();
          break;
      }
    });
  </script>
</body>
</html>
