<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GALACTIC STRIKER</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-family:'Press Start 2P',monospace;
      color:#00ffff;
      user-select:none;
    }
    h1 { font-size:.7rem; text-shadow:0 0 10px #00ffff; margin-bottom:10px; letter-spacing:.15em; }
    .hud { display:flex; gap:20px; margin-bottom:8px; font-size:.42rem; }
    .canvas-wrap { position:relative; }
    canvas { display:block; border:2px solid #00ffff; box-shadow:0 0 16px #00ffff; }
    .overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(0,0,0,.75); gap:12px;
    }
    .overlay h2 { font-size:.85rem; color:#00ffff; text-shadow:0 0 16px #00ffff; }
    .overlay .sub  { font-size:.38rem; color:#aaa; }
    .overlay .blink { font-size:.33rem; animation:blink 1s infinite; }
    .controls { margin-top:8px; font-size:.28rem; color:#004444; text-align:center; line-height:2.2; }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>
</head>
<body>
  <h1>GALACTIC STRIKER</h1>
  <div class="hud">
    <span>SCORE: <span id="score">0</span></span>
    <span>LIVES: <span id="lives">3</span></span>
    <span>BEST: <span id="best">0</span></span>
  </div>
  <div class="canvas-wrap">
    <canvas id="c" width="400" height="440"></canvas>
    <div class="overlay" id="overlay">
      <h2>GALACTIC STRIKER</h2>
      <p class="blink">PRESS SPACE TO START</p>
    </div>
  </div>
  <div class="controls">ARROW KEYS: MOVE &nbsp;|&nbsp; SPACE: SHOOT</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // Stars (background)
    const STARS = Array.from({length:80}, () => ({
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.5+.3,
      spd: Math.random()*.4+.1,
    }));

    // Enemy layout
    const ECOLS = 9, EROWS = 4;
    const EW = 28, EH = 20, EPADX = 12, EPADY = 14;
    const ENEMY_START_X = 28, ENEMY_START_Y = 40;

    let player, bullets, enemyBullets, enemies;
    let score, lives, best = 0, state = 'idle', raf;
    let enemyDirX, enemyStepDown, enemyShotTimer, stageSpeed;
    let keys = {};

    function initEnemies() {
      enemies = [];
      for (let r=0; r<EROWS; r++)
        for (let c=0; c<ECOLS; c++)
          enemies.push({
            x: ENEMY_START_X + c*(EW+EPADX),
            y: ENEMY_START_Y + r*(EH+EPADY),
            alive: true, row: r,
          });
    }

    function init() {
      player       = { x: W/2, y: H-36, w:24, h:18, speed:3.8 };
      bullets      = [];
      enemyBullets = [];
      score  = 0; lives = 3;
      stageSpeed = 0.8;
      enemyDirX    = 1;
      enemyStepDown = false;
      enemyShotTimer = 120;
      document.getElementById('score').textContent = '0';
      document.getElementById('lives').textContent = '3';
      initEnemies();
    }

    function drawShip(x, y, w, h, color) {
      ctx.fillStyle  = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(x + w/2, y);          // nose
      ctx.lineTo(x + w,   y + h);      // right bottom
      ctx.lineTo(x + w*.65, y + h*.7); // right notch
      ctx.lineTo(x + w/2,  y + h*.85); // center
      ctx.lineTo(x + w*.35, y + h*.7); // left notch
      ctx.lineTo(x,         y + h);    // left bottom
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawEnemy(x, y, row) {
      const colors = ['#ff4444','#ff8800','#ffff00','#44ff44'];
      const c = colors[row % colors.length];
      ctx.fillStyle  = c;
      ctx.shadowColor = c;
      ctx.shadowBlur = 6;
      // body
      ctx.fillRect(x+4, y+4, EW-8, EH-6);
      // antenna
      ctx.fillRect(x+6,  y,   4, 5);
      ctx.fillRect(x+EW-10, y, 4, 5);
      // legs
      ctx.fillRect(x+2,  y+EH-6, 5, 5);
      ctx.fillRect(x+EW-7, y+EH-6, 5, 5);
      // eyes
      ctx.fillStyle = '#000';
      ctx.fillRect(x+7,  y+7, 4, 4);
      ctx.fillRect(x+EW-11, y+7, 4, 4);
      ctx.shadowBlur = 0;
    }

    function update() {
      // Move stars
      for (const s of STARS) {
        s.y += s.spd;
        if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
      }

      // Player movement
      if (keys['ArrowLeft'])  player.x = Math.max(0, player.x - player.speed);
      if (keys['ArrowRight']) player.x = Math.min(W - player.w, player.x + player.speed);

      // Player bullets
      for (const b of bullets) b.y -= 8;
      bullets = bullets.filter(b => b.y > -10);

      // Enemy bullets
      for (const b of enemyBullets) b.y += 4;
      enemyBullets = enemyBullets.filter(b => b.y < H + 10);

      // Enemy movement
      const alive = enemies.filter(e => e.alive);
      if (alive.length === 0) { nextStage(); return; }

      const leftmost  = Math.min(...alive.map(e => e.x));
      const rightmost = Math.max(...alive.map(e => e.x + EW));

      if (enemyStepDown) {
        enemies.forEach(e => e.y += 18);
        enemyDirX    *= -1;
        enemyStepDown = false;
      } else {
        enemies.forEach(e => e.x += enemyDirX * stageSpeed);
        if (rightmost >= W - 4 || leftmost <= 4) enemyStepDown = true;
      }

      // Enemies reach bottom
      if (alive.some(e => e.y + EH >= player.y)) { loseLife(); return; }

      // Enemy shooting
      enemyShotTimer--;
      if (enemyShotTimer <= 0) {
        const shooters = alive.filter(e => {
          // only front-row enemies (no ally directly below)
          return !alive.some(o => o !== e && o.x === e.x && o.y > e.y);
        });
        if (shooters.length > 0) {
          const shooter = shooters[Math.random()*shooters.length|0];
          enemyBullets.push({ x: shooter.x + EW/2, y: shooter.y + EH });
        }
        enemyShotTimer = Math.max(40, 120 - Math.floor(score/100)*8);
      }

      // Bullet vs enemy collisions
      for (const b of bullets) {
        for (const e of enemies) {
          if (!e.alive) continue;
          if (b.x > e.x && b.x < e.x+EW && b.y > e.y && b.y < e.y+EH) {
            e.alive = false; b.y = -999;
            score += 10;
            document.getElementById('score').textContent = score;
            if (score > best) { best = score; document.getElementById('best').textContent = best; }
          }
        }
      }

      // Enemy bullet vs player
      for (const b of enemyBullets) {
        if (b.x > player.x+2 && b.x < player.x+player.w-2
         && b.y > player.y   && b.y < player.y+player.h) {
          b.y = H + 100;
          loseLife(); return;
        }
      }
    }

    function loseLife() {
      lives--;
      document.getElementById('lives').textContent = lives;
      if (lives <= 0) { endGame(false); return; }
      player.x = W/2 - 12;
      bullets = []; enemyBullets = [];
    }

    function nextStage() {
      stageSpeed = Math.min(stageSpeed + .4, 3);
      bullets = []; enemyBullets = [];
      initEnemies();
      enemyDirX = 1; enemyStepDown = false; enemyShotTimer = 100;
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      // Stars
      for (const s of STARS) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${.3 + s.r*.25})`;
        ctx.fill();
      }

      // Enemies
      for (const e of enemies) {
        if (e.alive) drawEnemy(e.x, e.y, e.row);
      }

      // Player
      drawShip(player.x, player.y, player.w, player.h, '#00ffff');

      // Player bullets
      for (const b of bullets) {
        ctx.fillStyle  = '#00ffff';
        ctx.shadowColor = '#00ffff';
        ctx.shadowBlur = 10;
        ctx.fillRect(b.x-2, b.y, 4, 14);
        ctx.shadowBlur = 0;
      }

      // Enemy bullets
      for (const b of enemyBullets) {
        ctx.fillStyle  = '#ff4444';
        ctx.shadowColor = '#ff4444';
        ctx.shadowBlur = 8;
        ctx.fillRect(b.x-2, b.y, 4, 10);
        ctx.shadowBlur = 0;
      }
    }

    function endGame(won) {
      cancelAnimationFrame(raf); state = 'over';
      const ol = document.getElementById('overlay');
      ol.innerHTML = `
        <h2>${won ? 'YOU WIN!' : 'GAME OVER'}</h2>
        <p class="sub">SCORE: ${score}</p>
        <p class="blink">PRESS SPACE TO RETRY</p>`;
      ol.style.display = 'flex';
    }

    let lastShot = 0;
    function loop(ts) {
      update(); draw();
      raf = requestAnimationFrame(loop);
    }

    function start() {
      init(); draw();
      document.getElementById('overlay').style.display = 'none';
      state = 'playing';
      raf = requestAnimationFrame(loop);
    }

    init(); draw();

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === ' ') {
        e.preventDefault();
        if (state !== 'playing') { start(); return; }
        if (bullets.length < 3) {
          bullets.push({ x: player.x + player.w/2, y: player.y });
        }
      }
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });
  </script>
</body>
</html>
