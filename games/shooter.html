<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GALACTIC STRIKER</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-family:'Press Start 2P',monospace;
      color:#00ffff;
      user-select:none;
    }
    h1 { font-size:.7rem; text-shadow:0 0 10px #00ffff; margin-bottom:10px; letter-spacing:.15em; }
    .hud { display:flex; gap:20px; margin-bottom:8px; font-size:.42rem; }
    .canvas-wrap { position:relative; }
    canvas { display:block; border:2px solid #00ffff; box-shadow:0 0 16px #00ffff; }
    .overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(0,0,0,.78); gap:14px;
    }
    .overlay h2 { font-size:.85rem; color:#00ffff; text-shadow:0 0 16px #00ffff; }
    .overlay .sub  { font-size:.38rem; color:#aaa; }
    .overlay .blink { font-size:.33rem; animation:blink 1s infinite; }
    .controls { margin-top:8px; font-size:.28rem; color:#004444; text-align:center; line-height:2.2; }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>
</head>
<body>
  <h1>GALACTIC STRIKER</h1>
  <div class="hud">
    <span>SCORE: <span id="score">0</span></span>
    <span>LIVES: <span id="lives">3</span></span>
    <span>BEST: <span id="best">0</span></span>
  </div>
  <div class="canvas-wrap">
    <canvas id="c" width="400" height="440"></canvas>
    <div class="overlay" id="overlay">
      <h2>GALACTIC STRIKER</h2>
      <p class="blink">PRESS SPACE TO START</p>
    </div>
  </div>
  <div class="controls">ARROW KEYS: MOVE &nbsp;|&nbsp; SPACE: SHOOT</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // Stars
    const STARS = Array.from({length:80}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.5+.3, spd: Math.random()*.4+.1,
    }));

    const ECOLS = 9, EROWS = 4;
    const EW = 28, EH = 20, EPADX = 11, EPADY = 14;
    const ROW_COLORS = ['#ff4444','#ff8800','#ffff00','#44ff44'];

    let player, bullets, enemyBullets, enemies;
    let score, lives, best = 0, state = 'idle', raf;
    let enemyDir, enemyTick, enemyTickMax, enemyShotTimer, stageNum;
    let keys = {};
    let shootCooldown = 0;

    function initEnemies() {
      enemies = [];
      const startX = (W - (ECOLS*(EW+EPADX) - EPADX)) / 2;
      for (let r=0; r<EROWS; r++)
        for (let c=0; c<ECOLS; c++)
          enemies.push({
            x: startX + c*(EW+EPADX),
            y: 40 + r*(EH+EPADY),
            alive: true, row: r,
          });
    }

    function init() {
      player        = { x: W/2 - 12, y: H-38, w:24, h:18 };
      bullets       = [];
      enemyBullets  = [];
      score         = 0; lives = 3; stageNum = 1;
      enemyDir      = 1;
      enemyTick     = 0;
      enemyTickMax  = 28; // frames per enemy step — decreases as enemies die
      enemyShotTimer = 90;
      shootCooldown = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('lives').textContent = '3';
      initEnemies();
    }

    function aliveEnemies() { return enemies.filter(e => e.alive); }

    function calcTickMax() {
      // Fewer enemies → faster movement
      const alive = aliveEnemies().length;
      const total = ECOLS * EROWS;
      return Math.max(6, Math.round(28 * alive / total) - (stageNum - 1) * 2);
    }

    function moveEnemies() {
      const alive = aliveEnemies();
      if (alive.length === 0) return;

      const leftmost  = Math.min(...alive.map(e => e.x));
      const rightmost = Math.max(...alive.map(e => e.x + EW));

      // Check if step-down needed BEFORE moving
      const willHitRight = enemyDir > 0 && rightmost + 6 >= W;
      const willHitLeft  = enemyDir < 0 && leftmost  - 6 <= 0;

      if (willHitRight || willHitLeft) {
        enemies.forEach(e => { if(e.alive) e.y += 18; });
        enemyDir *= -1;
      } else {
        enemies.forEach(e => { if(e.alive) e.x += enemyDir * 6; });
      }
    }

    function drawShip(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.shadowColor = color; ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(x + w/2, y);
      ctx.lineTo(x + w,   y + h);
      ctx.lineTo(x + w*.65, y + h*.7);
      ctx.lineTo(x + w/2,  y + h*.85);
      ctx.lineTo(x + w*.35, y + h*.7);
      ctx.lineTo(x,         y + h);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function drawEnemy(x, y, row) {
      const c = ROW_COLORS[row % ROW_COLORS.length];
      ctx.fillStyle = c; ctx.shadowColor = c; ctx.shadowBlur = 5;
      ctx.fillRect(x+4,    y+5,    EW-8, EH-7);
      ctx.fillRect(x+6,    y,      4,    6);
      ctx.fillRect(x+EW-10,y,      4,    6);
      ctx.fillRect(x+2,    y+EH-6, 5,    5);
      ctx.fillRect(x+EW-7, y+EH-6, 5,    5);
      ctx.fillStyle = '#000'; ctx.shadowBlur = 0;
      ctx.fillRect(x+7,    y+7,    4,    4);
      ctx.fillRect(x+EW-11,y+7,    4,    4);
      ctx.shadowBlur = 0;
    }

    function update() {
      // Stars
      for (const s of STARS) { s.y += s.spd; if (s.y > H) { s.y = 0; s.x = Math.random()*W; } }

      // Player movement
      if (keys['ArrowLeft'])  player.x = Math.max(0, player.x - 4);
      if (keys['ArrowRight']) player.x = Math.min(W - player.w, player.x + 4);
      if (shootCooldown > 0) shootCooldown--;

      // Shoot on held space (with cooldown)
      if (keys[' '] && shootCooldown === 0 && bullets.length < 3) {
        bullets.push({ x: player.x + player.w/2, y: player.y });
        shootCooldown = 18;
      }

      // Bullets
      for (const b of bullets) b.y -= 9;
      bullets = bullets.filter(b => b.y > -10);

      // Enemy bullets move
      for (const b of enemyBullets) b.y += 4;
      enemyBullets = enemyBullets.filter(b => b.y < H + 10);

      // Enemy tick-based movement
      enemyTick++;
      enemyTickMax = calcTickMax();
      if (enemyTick >= enemyTickMax) {
        enemyTick = 0;
        moveEnemies();
      }

      // Enemy reaches bottom → lose life
      const alive = aliveEnemies();
      if (alive.length === 0) { nextStage(); return; }
      if (alive.some(e => e.y + EH >= player.y + 4)) { endGame(false); return; }

      // Enemy shooting
      enemyShotTimer--;
      if (enemyShotTimer <= 0) {
        // Only bottom-row enemies shoot
        const shooters = alive.filter(e =>
          !alive.some(o => o.x === e.x && o.y > e.y)
        );
        if (shooters.length > 0) {
          const s = shooters[Math.random()*shooters.length|0];
          enemyBullets.push({ x: s.x + EW/2, y: s.y + EH });
        }
        enemyShotTimer = Math.max(35, 90 - score/20);
      }

      // Player bullets vs enemies
      for (const b of bullets) {
        for (const e of enemies) {
          if (!e.alive) continue;
          if (b.x > e.x && b.x < e.x+EW && b.y > e.y && b.y < e.y+EH) {
            e.alive = false; b.y = -999;
            score += 10;
            document.getElementById('score').textContent = score;
            if (score > best) { best = score; document.getElementById('best').textContent = best; }
            break;
          }
        }
      }

      // Enemy bullets vs player
      for (const b of enemyBullets) {
        if (b.x > player.x+2 && b.x < player.x+player.w-2
         && b.y > player.y   && b.y < player.y+player.h) {
          b.y = H + 999;
          loseLife(); return;
        }
      }
    }

    function loseLife() {
      lives--;
      document.getElementById('lives').textContent = lives;
      if (lives <= 0) { endGame(false); return; }
      player.x = W/2 - 12;
      bullets = []; enemyBullets = [];
    }

    function nextStage() {
      stageNum++;
      bullets = []; enemyBullets = [];
      initEnemies();
      enemyDir = 1; enemyTick = 0;
      enemyShotTimer = Math.max(40, 90 - stageNum * 8);
      showStageMessage();
    }

    function showStageMessage() {
      const ol = document.getElementById('overlay');
      ol.innerHTML = `
        <h2>STAGE ${stageNum}</h2>
        <p class="blink">PRESS SPACE TO CONTINUE</p>`;
      ol.style.display = 'flex';
      state = 'stage';
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      // Stars
      for (const s of STARS) {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${.3 + s.r*.2})`;
        ctx.fill();
      }

      // Enemies
      for (const e of enemies) { if (e.alive) drawEnemy(e.x, e.y, e.row); }

      // Player
      drawShip(player.x, player.y, player.w, player.h, '#00ffff');

      // Player bullets
      for (const b of bullets) {
        ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 10;
        ctx.fillRect(b.x-2, b.y, 4, 14);
        ctx.shadowBlur = 0;
      }

      // Enemy bullets
      for (const b of enemyBullets) {
        ctx.fillStyle = '#ff4444'; ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 8;
        ctx.fillRect(b.x-2, b.y, 4, 10);
        ctx.shadowBlur = 0;
      }

      // Stage number
      ctx.fillStyle = 'rgba(0,255,255,.15)';
      ctx.font = 'bold 10px "Press Start 2P"';
      ctx.textAlign = 'right';
      ctx.fillText(`STG ${stageNum}`, W-8, H-8);
      ctx.textAlign = 'left';
    }

    function endGame(won) {
      cancelAnimationFrame(raf); state = 'over';
      const ol = document.getElementById('overlay');
      ol.innerHTML = `
        <h2>${won ? 'YOU WIN!' : 'GAME OVER'}</h2>
        <p class="sub">SCORE: ${score}</p>
        <p class="blink">PRESS SPACE TO RETRY</p>`;
      ol.style.display = 'flex';
    }

    function loop() { update(); draw(); raf = requestAnimationFrame(loop); }

    function start() {
      init(); draw();
      document.getElementById('overlay').style.display = 'none';
      state = 'playing';
      raf = requestAnimationFrame(loop);
    }

    init(); draw();

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === ' ') e.preventDefault();
      if (e.key === ' ') {
        if (state === 'idle' || state === 'over') { start(); return; }
        if (state === 'stage') {
          document.getElementById('overlay').style.display = 'none';
          state = 'playing';
        }
      }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });
  </script>
</body>
</html>
