<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>BLOCK BUSTER</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-family:'Press Start 2P',monospace;
      color:#ff6600;
      user-select:none;
    }
    h1 { font-size:.75rem; text-shadow:0 0 10px #ff6600; margin-bottom:10px; letter-spacing:.2em; }
    .hud { display:flex; gap:20px; margin-bottom:8px; font-size:.42rem; }
    .canvas-wrap { position:relative; }
    canvas { display:block; border:2px solid #ff6600; box-shadow:0 0 16px #ff6600; }
    .overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(0,0,0,.72); gap:12px;
    }
    .overlay h2 { font-size:.9rem; color:#ff6600; text-shadow:0 0 16px #ff6600; }
    .overlay .sub  { font-size:.38rem; color:#aaa; }
    .overlay .blink { font-size:.33rem; animation:blink 1s infinite; }
    .controls { margin-top:8px; font-size:.28rem; color:#4a2200; text-align:center; line-height:2.2; }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>
</head>
<body>
  <h1>BLOCK BUSTER</h1>
  <div class="hud">
    <span>SCORE: <span id="score">0</span></span>
    <span>LIVES: <span id="lives">3</span></span>
    <span>BEST: <span id="best">0</span></span>
  </div>
  <div class="canvas-wrap">
    <canvas id="c" width="400" height="420"></canvas>
    <div class="overlay" id="overlay">
      <h2>BLOCK BUSTER</h2>
      <p class="blink">PRESS SPACE TO START</p>
    </div>
  </div>
  <div class="controls">ARROW KEYS / MOUSE: PADDLE &nbsp;|&nbsp; SPACE: LAUNCH BALL</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    // Layout
    const PW = 76, PH = 10, PY = 396;
    const BR = 7;
    const BCOLS = 10, BROWS = 5;
    const BW = 36, BH = 14, BPX = 2, BPY = 2;
    const BOX = 8, BOY = 28;

    const ROW_COLORS = [
      ['#ff2020','#cc0000'],
      ['#ff7700','#cc4400'],
      ['#ffee00','#aaaa00'],
      ['#22cc22','#118811'],
      ['#2288ff','#1155cc'],
    ];

    let px, ball, bricks, score, lives, best = 0, launched, state = 'idle', raf;

    function init() {
      px       = (canvas.width - PW) / 2;
      ball     = { x: canvas.width/2, y: PY - BR - 2, vx: 3.2, vy: -3.2 };
      launched = false;
      score    = 0; lives = 3;
      document.getElementById('score').textContent = '0';
      document.getElementById('lives').textContent = '3';
      buildBricks();
    }

    function buildBricks() {
      bricks = [];
      for (let r=0; r<BROWS; r++)
        for (let c=0; c<BCOLS; c++)
          bricks.push({ x: BOX + c*(BW+BPX), y: BOY + r*(BH+BPY), alive:true, colors: ROW_COLORS[r] });
    }

    function update() {
      if (!launched) { ball.x = px + PW/2; return; }

      ball.x += ball.vx;
      ball.y += ball.vy;

      // Walls
      if (ball.x - BR < 0)              { ball.x = BR;                    ball.vx *= -1; }
      if (ball.x + BR > canvas.width)   { ball.x = canvas.width - BR;     ball.vx *= -1; }
      if (ball.y - BR < 0)              { ball.y = BR;                     ball.vy *= -1; }

      // Paddle
      if (ball.vy > 0
          && ball.y + BR >= PY
          && ball.y + BR <= PY + PH + 8
          && ball.x >= px - 4
          && ball.x <= px + PW + 4) {
        ball.vy = -Math.abs(ball.vy);
        const rel = (ball.x - px) / PW - .5;   // -0.5 ~ +0.5
        ball.vx = rel * 9;
        // clamp speed
        const spd = Math.hypot(ball.vx, ball.vy);
        if (spd > 8) { ball.vx *= 8/spd; ball.vy *= 8/spd; }
        if (spd < 3) { ball.vx *= 3/spd; ball.vy *= 3/spd; }
      }

      // Bottom
      if (ball.y - BR > canvas.height) {
        lives--;
        document.getElementById('lives').textContent = lives;
        if (lives <= 0) { endGame(false); return; }
        launched = false;
        ball.x = px + PW/2;
        ball.y = PY - BR - 2;
        ball.vx = 3.2; ball.vy = -3.2;
      }

      // Bricks
      for (const b of bricks) {
        if (!b.alive) continue;
        if (ball.x+BR > b.x && ball.x-BR < b.x+BW
         && ball.y+BR > b.y && ball.y-BR < b.y+BH) {
          b.alive = false;
          score += 10;
          document.getElementById('score').textContent = score;
          if (score > best) { best = score; document.getElementById('best').textContent = best; }
          // Determine bounce axis
          const ot = (ball.y+BR) - b.y;
          const ob = (b.y+BH) - (ball.y-BR);
          const ol = (ball.x+BR) - b.x;
          const or_ = (b.x+BW) - (ball.x-BR);
          if (Math.min(ot,ob) < Math.min(ol,or_)) ball.vy *= -1;
          else ball.vx *= -1;
          break;
        }
      }

      if (bricks.every(b => !b.alive)) endGame(true);
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Bricks
      for (const b of bricks) {
        if (!b.alive) continue;
        const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y+BH);
        g.addColorStop(0, b.colors[0]);
        g.addColorStop(1, b.colors[1]);
        ctx.fillStyle = g;
        ctx.fillRect(b.x, b.y, BW, BH);
        ctx.strokeStyle = 'rgba(0,0,0,.45)';
        ctx.lineWidth = 1;
        ctx.strokeRect(b.x, b.y, BW, BH);
      }

      // Paddle
      ctx.fillStyle  = '#ff6600';
      ctx.shadowColor = '#ff6600';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.roundRect(px, PY, PW, PH, 3);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Ball
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BR, 0, Math.PI*2);
      ctx.fillStyle  = '#fff';
      ctx.shadowColor = '#ffcc88';
      ctx.shadowBlur = 14;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function endGame(won) {
      cancelAnimationFrame(raf);
      state = won ? 'won' : 'over';
      const ol = document.getElementById('overlay');
      ol.innerHTML = `
        <h2>${won ? 'CLEAR!' : 'GAME OVER'}</h2>
        <p class="sub">SCORE: ${score}</p>
        <p class="blink">PRESS SPACE TO RETRY</p>`;
      ol.style.display = 'flex';
    }

    function loop() { update(); draw(); raf = requestAnimationFrame(loop); }

    function start() {
      init(); draw();
      document.getElementById('overlay').style.display = 'none';
      state = 'playing';
      loop();
    }

    init(); draw();

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft')  { px = Math.max(0, px - 18); e.preventDefault(); }
      if (e.key === 'ArrowRight') { px = Math.min(canvas.width - PW, px + 18); e.preventDefault(); }
      if (e.key === ' ') {
        e.preventDefault();
        if (state !== 'playing') { start(); return; }
        launched = true;
      }
    });

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      px = Math.max(0, Math.min(canvas.width - PW, e.clientX - rect.left - PW/2));
    });
  </script>
</body>
</html>
