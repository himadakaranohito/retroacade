<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>BLOCK BUSTER</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-family:'Press Start 2P',monospace;
      color:#ff6600;
      user-select:none;
    }
    h1 { font-size:.75rem; text-shadow:0 0 10px #ff6600; margin-bottom:10px; letter-spacing:.2em; }
    .hud { display:flex; gap:18px; margin-bottom:8px; font-size:.4rem; flex-wrap:wrap; justify-content:center; }
    .canvas-wrap { position:relative; }
    canvas { display:block; border:2px solid #ff6600; box-shadow:0 0 16px #ff6600; }
    .overlay {
      position:absolute; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(0,0,0,.75); gap:12px;
    }
    .overlay h2 { font-size:.9rem; color:#ff6600; text-shadow:0 0 16px #ff6600; }
    .overlay .sub  { font-size:.38rem; color:#aaa; }
    .overlay .blink { font-size:.33rem; animation:blink 1s infinite; }
    .controls { margin-top:8px; font-size:.28rem; color:#4a2200; text-align:center; line-height:2.2; }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>
</head>
<body>
  <h1>BLOCK BUSTER</h1>
  <div class="hud">
    <span>SCORE: <span id="score">0</span></span>
    <span>LIVES: <span id="lives">3</span></span>
    <span>STG: <span id="stg">1</span></span>
    <span>BEST: <span id="best">0</span></span>
  </div>
  <div class="canvas-wrap">
    <canvas id="c" width="400" height="420"></canvas>
    <div class="overlay" id="overlay">
      <h2>BLOCK BUSTER</h2>
      <p class="blink">PRESS SPACE TO START</p>
    </div>
  </div>
  <div class="controls">ARROW KEYS / MOUSE: PADDLE &nbsp;|&nbsp; SPACE: LAUNCH BALL</div>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const PH = 10, PY = H - 24;
    const BR = 7;
    const BW = 36, BH = 14, BPX = 2, BPY = 2;
    const BOX = 8, BOY = 28;

    const ROW_COLORS = [
      ['#ff2020','#cc0000'],
      ['#ff7700','#cc4400'],
      ['#ffee00','#aaaa00'],
      ['#22cc22','#118811'],
      ['#2288ff','#1155cc'],
    ];

    // Item types
    const ITEM_TYPES = [
      { type:'wide',   color:'#00ff41', label:'W', desc:'WIDE'  },
      { type:'slow',   color:'#00ffff', label:'S', desc:'SLOW'  },
      { type:'life',   color:'#ff00ff', label:'+', desc:'+LIFE' },
      { type:'multi',  color:'#ffff00', label:'M', desc:'MULTI' },
    ];

    let px, PW, balls, bricks, items, score, lives, best = 0;
    let state = 'idle', raf, stageNum;
    let wideTimer = 0, slowTimer = 0;

    function init() {
      PW       = 76;
      px       = (W - PW) / 2;
      balls    = [makeBall(W/2, PY - BR - 2, false)];
      items    = [];
      score    = 0; lives = 3; stageNum = 1;
      wideTimer = 0; slowTimer = 0;
      document.getElementById('score').textContent = '0';
      document.getElementById('lives').textContent = '3';
      document.getElementById('stg').textContent   = '1';
      buildBricks(stageNum);
    }

    function makeBall(x, y, launched) {
      const angle = -Math.PI/2 + (Math.random()-.5)*.6;
      const spd = 3.5;
      return { x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd, launched };
    }

    function buildBricks(stage) {
      bricks = [];
      // More rows as stage increases (max 7)
      const rows = Math.min(5 + stage - 1, 7);
      const cols = 10;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          // Higher stages: some bricks need 2 hits
          const hp = (stage >= 3 && r < 2) ? 2 : 1;
          bricks.push({
            x: BOX + c*(BW+BPX),
            y: BOY + r*(BH+BPY),
            alive: true,
            hp, maxHp: hp,
            colors: ROW_COLORS[r % ROW_COLORS.length],
          });
        }
      }
    }

    function spawnItem(x, y) {
      if (Math.random() > .28) return; // 28% chance
      const def = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
      items.push({ x: x - 12, y, w: 24, h: 16, vy: 2.2, ...def });
    }

    function ballSpeed() { return slowTimer > 0 ? 3.0 : 3.5 + (stageNum-1)*.3; }

    function updateBall(b) {
      if (!b.launched) {
        b.x = px + (slowTimer > 0 ? PW/2 : PW/2);
        return;
      }

      // Normalize speed
      const spd = ballSpeed();
      const cur = Math.hypot(b.vx, b.vy);
      if (cur > 0) { b.vx = b.vx/cur*spd; b.vy = b.vy/cur*spd; }

      b.x += b.vx; b.y += b.vy;

      // Walls
      if (b.x - BR < 0)    { b.x = BR;    b.vx =  Math.abs(b.vx); }
      if (b.x + BR > W)    { b.x = W-BR;  b.vx = -Math.abs(b.vx); }
      if (b.y - BR < 0)    { b.y = BR;    b.vy =  Math.abs(b.vy); }

      // Paddle
      const pw = wideTimer > 0 ? PW * 1.5 : PW;
      const padX = wideTimer > 0 ? px - pw*.25 : px;
      if (b.vy > 0
          && b.y + BR >= PY
          && b.y + BR <= PY + PH + 8
          && b.x >= padX - 2
          && b.x <= padX + pw + 2) {
        b.vy = -Math.abs(b.vy);
        const rel = (b.x - padX) / pw - .5;
        b.vx = rel * 9;
      }

      // Bottom
      if (b.y - BR > H) { b.alive = false; }

      // Bricks
      for (const bk of bricks) {
        if (!bk.alive) continue;
        if (b.x+BR > bk.x && b.x-BR < bk.x+BW
         && b.y+BR > bk.y && b.y-BR < bk.y+BH) {
          bk.hp--;
          if (bk.hp <= 0) {
            bk.alive = false;
            spawnItem(bk.x + BW/2, bk.y + BH);
            score += 10;
            document.getElementById('score').textContent = score;
            if (score > best) { best = score; document.getElementById('best').textContent = best; }
          }
          const ot = (b.y+BR) - bk.y, ob = (bk.y+BH) - (b.y-BR);
          const ol = (b.x+BR) - bk.x, or_ = (bk.x+BW) - (b.x-BR);
          if (Math.min(ot,ob) < Math.min(ol,or_)) b.vy *= -1;
          else b.vx *= -1;
          break;
        }
      }
    }

    function update() {
      // Timers
      if (wideTimer > 0) wideTimer--;
      if (slowTimer > 0) slowTimer--;

      // Player input
      if (keys['ArrowLeft'])  px = Math.max(0, px - 18);
      if (keys['ArrowRight']) px = Math.min(W - PW, px + 18);

      // Balls
      balls.forEach(b => updateBall(b));
      balls = balls.filter(b => b.alive !== false);

      // All balls lost
      if (balls.length === 0) {
        lives--;
        document.getElementById('lives').textContent = lives;
        if (lives <= 0) { endGame(false); return; }
        balls = [makeBall(px + PW/2, PY - BR - 2, false)];
        wideTimer = 0;
      }

      // Items
      for (const it of items) {
        it.y += it.vy;
        const pw = wideTimer > 0 ? PW * 1.5 : PW;
        const padX = wideTimer > 0 ? px - pw*.25 : px;
        if (it.y + it.h >= PY && it.y <= PY + PH
         && it.x + it.w >= padX && it.x <= padX + pw) {
          applyItem(it.type);
          it.y = H + 999;
        }
      }
      items = items.filter(it => it.y < H + 100);

      // Stage clear
      if (bricks.every(b => !b.alive)) { nextStage(); }
    }

    function applyItem(type) {
      if (type === 'wide')  { wideTimer = 600; }
      if (type === 'slow')  { slowTimer = 400; }
      if (type === 'life')  { lives = Math.min(lives+1, 9); document.getElementById('lives').textContent = lives; }
      if (type === 'multi') {
        // Spawn 2 extra balls from existing balls
        const extras = [];
        balls.forEach(b => {
          if (b.launched) {
            extras.push({ ...b, vx: b.vx * -1 + 1, vy: b.vy, alive: true });
            extras.push({ ...b, vx: b.vx * -.5,    vy: b.vy, alive: true });
          }
        });
        balls.push(...extras.slice(0, 4));
      }
    }

    function nextStage() {
      stageNum++;
      document.getElementById('stg').textContent = stageNum;
      items = [];
      // Keep balls and lives
      balls = balls.filter(b => b.launched).map(b => ({ ...b }));
      if (balls.length === 0) balls = [makeBall(px + PW/2, PY - BR - 2, false)];
      buildBricks(stageNum);
      state = 'stage';
      const ol = document.getElementById('overlay');
      ol.innerHTML = `
        <h2>STAGE ${stageNum}</h2>
        <p class="sub">SCORE: ${score}</p>
        <p class="blink">PRESS SPACE TO CONTINUE</p>`;
      ol.style.display = 'flex';
    }

    function draw() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      // Bricks
      for (const bk of bricks) {
        if (!bk.alive) continue;
        const dim = bk.hp < bk.maxHp ? .5 : 1;
        const g = ctx.createLinearGradient(bk.x, bk.y, bk.x, bk.y+BH);
        g.addColorStop(0, bk.colors[0]);
        g.addColorStop(1, bk.colors[1]);
        ctx.globalAlpha = dim;
        ctx.fillStyle = g;
        ctx.fillRect(bk.x, bk.y, BW, BH);
        ctx.strokeStyle = 'rgba(0,0,0,.45)'; ctx.lineWidth = 1;
        ctx.strokeRect(bk.x, bk.y, BW, BH);
        // HP crack indicator
        if (bk.hp < bk.maxHp) {
          ctx.fillStyle = 'rgba(0,0,0,.6)';
          ctx.fillRect(bk.x+8, bk.y+5, BW-16, 4);
        }
        ctx.globalAlpha = 1;
      }

      // Items
      for (const it of items) {
        ctx.fillStyle = it.color;
        ctx.shadowColor = it.color; ctx.shadowBlur = 8;
        ctx.fillRect(it.x, it.y, it.w, it.h);
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#000';
        ctx.font = '7px "Press Start 2P"';
        ctx.textAlign = 'center';
        ctx.fillText(it.label, it.x + it.w/2, it.y + it.h - 4);
        ctx.textAlign = 'left';
      }

      // Paddle
      const pw = wideTimer > 0 ? PW * 1.5 : PW;
      const padX = wideTimer > 0 ? px - pw*.25 : px;
      ctx.fillStyle = wideTimer > 0 ? '#00ff41' : '#ff6600';
      ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 12;
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(padX, PY, pw, PH, 3);
      else ctx.rect(padX, PY, pw, PH);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Balls
      for (const b of balls) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, BR, 0, Math.PI*2);
        ctx.fillStyle = '#fff';
        ctx.shadowColor = '#ffcc88'; ctx.shadowBlur = 14;
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Active effect indicators
      let iy = H - 10;
      ctx.font = '6px "Press Start 2P"';
      if (wideTimer > 0) { ctx.fillStyle = '#00ff41'; ctx.fillText(`WIDE ${Math.ceil(wideTimer/60)}s`, 4, iy); iy -= 12; }
      if (slowTimer > 0) { ctx.fillStyle = '#00ffff'; ctx.fillText(`SLOW ${Math.ceil(slowTimer/60)}s`, 4, iy); }
    }

    function endGame(won) {
      cancelAnimationFrame(raf); state = 'over';
      const ol = document.getElementById('overlay');
      ol.innerHTML = `
        <h2>${won ? 'ALL CLEAR!' : 'GAME OVER'}</h2>
        <p class="sub">SCORE: ${score}</p>
        <p class="blink">PRESS SPACE TO RETRY</p>`;
      ol.style.display = 'flex';
    }

    function loop() { update(); draw(); raf = requestAnimationFrame(loop); }

    function start() {
      init(); draw();
      document.getElementById('overlay').style.display = 'none';
      state = 'playing';
      raf = requestAnimationFrame(loop);
    }

    const keys = {};
    init(); draw();

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
      if (e.key === ' ') {
        e.preventDefault();
        if (state === 'idle' || state === 'over') { start(); return; }
        if (state === 'stage') {
          document.getElementById('overlay').style.display = 'none';
          state = 'playing'; return;
        }
        // Launch all unlaunched balls
        balls.forEach(b => { if (!b.launched) b.launched = true; });
      }
    });
    document.addEventListener('keyup', e => { keys[e.key] = false; });

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      px = Math.max(0, Math.min(W - PW, e.clientX - rect.left - PW/2));
    });
  </script>
</body>
</html>
